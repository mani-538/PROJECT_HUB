{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center fade-in-up">
  <div style="font-size:8rem;line-height:1;margin-bottom:1rem;color:var(--primary);opacity:0.8;">404</div>
  <h2 class="fw-800 mb-3" style="font-weight:800;">Page Not Found</h2>
  <p class="text-muted mb-4" style="max-width:400px;">We couldn't find the page you're looking for. It might have been moved or doesn't exist.</p>
  <div>
    <button onclick="history.back()" class="btn btn-outline-secondary px-4 me-2"><i class="bi bi-arrow-left me-1"></i>Go Back</button>
    <a href="{{ url_for('auth.role_select') }}" class="btn btn-primary px-4"><i class="bi bi-house me-1"></i>Go Home</a>
  </div>
</div>
{% endblock %}
