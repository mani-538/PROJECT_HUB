{% extends 'base.html' %}
{% block title %}Internal Server Error{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center fade-in-up">
  <div style="font-size:8rem;line-height:1;margin-bottom:1rem;color:var(--danger);opacity:0.8;">500</div>
  <h2 class="fw-800 mb-3" style="font-weight:800;">Internal Server Error</h2>
  <p class="text-muted mb-4" style="max-width:400px;">Something went wrong on our end. Our team has been notified. Please try again later.</p>
  <div>
    <a href="{{ url_for('auth.role_select') }}" class="btn btn-primary px-4"><i class="bi bi-arrow-clockwise me-1"></i>Try Again</a>
  </div>
</div>
{% endblock %}
