{% extends 'base.html' %}
{% block title %}New Query{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-chat-plus me-2 text-primary"></i>Send a Query</h1>
  <p>Have a question or concern? Reach out to the admin.</p>
</div>
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Subject <span class="text-danger">*</span></label>
          <input type="text" name="subject" class="form-control" placeholder="Brief subject of your query" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Message <span class="text-danger">*</span></label>
          <textarea name="message" class="form-control" rows="6" placeholder="Describe your query in detail..." required></textarea>
        </div>
        <div class="d-flex gap-3">
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-send me-2"></i>Submit Query</button>
          <a href="{{ url_for('student.queries') }}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
