{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/auth-theme.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="bg-circle circle3"></div>

<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 8rem);">
    <div class="glass-card fade-in-up">
        <div class="logo-wrapper logo-large mb-4">
            <div class="logo-symbol"><i class="fas fa-infinity"></i></div>
            <div class="logo-text">Project Hub</div>
        </div>
        <h3 class="mb-4 fw-bold">Sign In</h3>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email or Username</label>
            <div class="input-group shadow-sm">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="identifier" class="form-control" placeholder="Email or username" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group shadow-sm">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input border-secondary" style="background:rgba(255,255,255,0.1);" type="checkbox" name="remember" id="remember">
              <label class="form-check-label small" style="color:rgba(255,255,255,0.8);" for="remember">Remember me</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        
        <hr class="my-3 border-secondary" style="opacity:0.3;">
        <div class="text-center p-2 rounded" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);">
          <small class="d-block mb-1" style="color:rgba(255,255,255,0.7);">Demo Credentials</small>
          <small class="text-info">Admin: <code>admin@projecthub.com</code> / <code>Admin@123</code></small>
        </div>
        <p class="text-center small mt-4 mb-0" style="color:rgba(255,255,255,0.7);">
          Don't have an account? <a href="{{ url_for('auth.role_select') }}" class="fw-bold">Register</a>
        </p>
    </div>
</div>
{% endblock %}
